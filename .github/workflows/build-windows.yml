name: Build Windows x86-64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.9'
    
    - name: Build for Windows x86-64
      env:
        GOOS: windows
        GOARCH: amd64
      run: |
        go build -o typora-keeptrying.exe -v .
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: typora-keeptrying-windows-amd64
        path: typora-keeptrying.exe
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: typora-keeptrying.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
